// ===== STATE =====
let mode = "flash";
let current = 0;

// ===== MODE TOGGLE =====
function toggleMode() {
    if (mode === "flash") {
        mode = "quiz";
        document.getElementById("modeBtn").textContent = "Quiz Mode";
        quizMode();
    } else {
        mode = "flash";
        document.getElementById("modeBtn").textContent = "Flashcard";
        flashMode();
    }
}

// ===== FLASHCARD =====
function loadFlashcard() {
    document.getElementById("options").innerHTML = "";
    document.getElementById("kanji").style.display = "none";

    document.getElementById("word").textContent = cards[current].english;
    document.getElementById("kanji").textContent = cards[current].kanji;
}

function showAnswer() {
    if (mode !== "flash") return;
    document.getElementById("kanji").style.display = "block";
}

function nextCard() {
    current = Math.floor(Math.random() * cards.length);

    if (mode === "flash") {
        loadFlashcard();
    } else {
        quizMode();
    }
}

// ===== FLASH MODE =====
function flashMode() {
    mode = "flash";
    document.getElementById("options").innerHTML = "";
    document.getElementById("kanji").style.display = "none";
    nextCard();
}

// ===== QUIZ MODE =====
function quizMode() {
    mode = "quiz";

    const correct = cards[Math.floor(Math.random() * cards.length)];
    current = cards.indexOf(correct);

    document.getElementById("word").textContent = "";
    document.getElementById("kanji").textContent = correct.kanji;
    document.getElementById("kanji").style.display = "block";

    let options = [correct];

    while (options.length < 4) {
        let r = cards[Math.floor(Math.random() * cards.length)];
        if (!options.includes(r)) options.push(r);
    }

    options.sort(() => Math.random() - 0.5);

    const container = document.getElementById("options");
    container.innerHTML = "";

    options.forEach(opt => {
        const btn = document.createElement("button");
        btn.textContent = opt.english;

        btn.onclick = () => {
            const allButtons = document.querySelectorAll("#options button");
            allButtons.forEach(b => b.disabled = true);

            if (opt.english === correct.english) {
                btn.style.background = "#2ecc71";
            } else {
                btn.style.background = "#e74c3c";
            }

            allButtons.forEach(b => {
                if (b.textContent === correct.english) {
                    b.style.background = "#2ecc71";
                }
            });

            setTimeout(() => {
                quizMode();
            }, 800);
        };

        container.appendChild(btn);
    });
}

// ===== KEYBOARD =====
document.addEventListener("keydown", function(event) {
    if (event.key === "ArrowLeft" || event.key.toLowerCase() === "w") {
        nextCard();
    }

    if (event.code === "Space") {
        event.preventDefault();
        if (mode === "flash") showAnswer();
    }
});

];

function setRandomBackground() {
    const random = colors[Math.floor(Math.random() * colors.length)];
    document.body.style.background = random;
}

// ===== START (IMPORTANT ORDER) =====
window.onload = () => {
